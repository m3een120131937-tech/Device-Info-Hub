workflows:
  default-workflow:
    name: Mainalasri Technician Pro Build
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: 18.0.0
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install -g eas-cli
      - name: Configure EAS
        script: |
          echo $EAS_JSON | base64 -d > eas.json
      - name: Build APK
        script: |
          eas build --platform android --non-interactive
    artifacts:
      - build/**/*.apk
    publishing:
      email:
        recipients:
          - m3een120131937@gmail.com